name: Build K8smeta plugin
on:
  pull_request:
    branches: [main]
    paths:
      - "plugins/k8smeta/**"
  push:
    branches: [main]
    paths:
      - "plugins/k8smeta/**"
  workflow_dispatch:

# Checks if any concurrent jobs under the same pull request or branch are being executed
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build-and-test
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout ⤵️
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
          check-latest: true

      - name: Install deps ⛓️
        run: |
          sudo apt update -y
          sudo apt install -y --no-install-recommends cmake build-essential autoconf libtool pkg-config

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: cpp

      - name: Build k8s meta plugin 🏗️
        run: |
          cd plugins/k8smeta
          mkdir build
          cd build && cmake -DCMAKE_BUILD_TYPE=Release ../
          make k8smeta -j6

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2

      - name: Build and run tests 🏎️
        run: |
          cd plugins/k8smeta/build
          make build-server
          make build-tests
          make run-server &
          make run-tests

  formatting-check:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install clang-format
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang-format-14

      - name: Run clang-format style check
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: .github/clang-format-check.sh 14 plugins/k8smeta
