name: Update plugin changelogs

on:
  workflow_dispatch:
    inputs:
      plugins:
        description: 'Optional comma-separated list of plugins (e.g. "github,kafka"). Leave empty to update all plugins.'
        required: false
        type: string
        default: ''

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-changelogs
  cancel-in-progress: false

jobs:
  update-changelogs:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: build/changelog/go.mod
          check-latest: true

      - name: Update changelogs
        id: update
        env:
          PLUGINS_INPUT: ${{ inputs.plugins }}
        run: |
          set -euo pipefail

          # Only allow an empty or a comma-separated list of plugins.
          if ! grep -qE '^([a-zA-Z0-9_-]+(,[a-zA-Z0-9_-]+)*)?$' <<< "${PLUGINS_INPUT}"; then
            echo "::error::Invalid plugins input: '${PLUGINS_INPUT}' (expected comma-separated plugins like 'github,kafka')."
            exit 1
          fi

          # The list is valid. Check that each plugin has a corresponding directory.
          IFS=',' read -ra PLUGINS <<< "${PLUGINS_INPUT}"
          for PLUGIN in "${PLUGINS[@]}"; do
            if [ ! -d "plugins/${PLUGIN}" ]; then
              echo "::error::Plugin directory not found: 'plugins/${PLUGIN}'."
              exit 1
            fi
          done

          # If no specific plugins were requested, target all of them.
          if [ "${#PLUGINS[@]}" -eq 0 ]; then
            ALL_PLUGINS=$(ls -d plugins/*/ | cut -d/ -f2)
            mapfile -t PLUGINS <<< "${ALL_PLUGINS}"
          fi

          # Update changelog(s).
          for PLUGIN in "${PLUGINS[@]}"; do
            echo "Updating changelog for ${PLUGIN} (released only)."
            make "changelog/${PLUGIN}" CHANGELOG_FLAGS=-r
          done

          # Collect plugins whose changelog actually changed (regardless of what was requested).
          CHANGED_FILES=$(git ls-files --modified --others --exclude-standard -- 'plugins/*/CHANGELOG.md')
          mapfile -t CHANGED_PLUGINS < <(echo -n "${CHANGED_FILES}" | cut -d/ -f2)

          if [ "${#CHANGED_PLUGINS[@]}" -eq 0 ]; then
            echo "No changelog changes, nothing to commit."
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # Compute PR/commit title and share it with the following step.
          if [ "${#CHANGED_PLUGINS[@]}" -eq 1 ]; then
            PR_TITLE="docs(plugins/${CHANGED_PLUGINS[0]}): update changelog"
          else
            PR_TITLE="docs(plugins): bulk update changelogs"
          fi
          echo "PR_TITLE=${PR_TITLE}" >> "${GITHUB_ENV}"
          echo "has_changes=true" >> "${GITHUB_OUTPUT}"

      - name: Open PR
        if: steps.update.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: update/changelogs
          add-paths: plugins/*/CHANGELOG.md
          signoff: true
          title: ${{ env.PR_TITLE }}
          commit-message: ${{ env.PR_TITLE }}
          body: |
            Automated changelog update. Generated with `make changelog/<plugin> CHANGELOG_FLAGS=-r`.
            /kind documentation
            /area plugins
            ```release-note
            NONE
            ```
