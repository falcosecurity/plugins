name: Build dummy_c plugin
on:
  pull_request:
    branches: [main]
    paths:
      - "plugins/dummy_c/**"
  push:
    branches: [main]
    paths:
      - "plugins/dummy_c/**"
  workflow_dispatch:

# Checks if any concurrent jobs under the same pull request or branch are being executed
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout ⤵️
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Install deps ⛓️
        run: |
          sudo apt update -y
          sudo apt install -y --no-install-recommends build-essential

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: cpp

      - name: Build dummy_c plugin 🏗️
        run: |
          cd plugins/dummy_c
          make libdummy_c.so

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1

  formatting-check:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install clang-format
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang-format-14

      - name: Run clang-format style check
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: .github/clang-format-check.sh 14 plugins/dummy_c
